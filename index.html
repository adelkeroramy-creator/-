<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Birthday</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
overflow:hidden;
}

/* الصفحة الأولى */
#page1{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ffb3c1);
position:absolute;
width:100%;
z-index:10;
}

button{
padding:15px 25px;
border:none;
border-radius:25px;
font-size:18px;
background:white;
color:#ff4d6d;
font-weight:bold;
}

/* الصفحة الثانية */
#page2{
display:none;
height:100vh;
width:100%;
position:absolute;
}

/* 🎬 ستارة السينما */
.curtain{
position:absolute;
width:50%;
height:100%;
top:0;
background:#8b0000;
z-index:5;
transition:all 1.5s ease;
}

.leftCurtain{left:0;}
.rightCurtain{right:0;}

.open .leftCurtain{transform:translateX(-100%);}
.open .rightCurtain{transform:translateX(100%);}

/* المحتوى */
.wrapper{
display:flex;
height:100%;
width:100%;
}

.strip{
width:70px;
background:#000;
display:flex;
flex-direction:column;
justify-content:space-around;
align-items:center;
animation:moveStrip 2.5s infinite alternate;
}

@keyframes moveStrip{
0%{transform:translateY(0);}
100%{transform:translateY(-10px);}
}

.hole{
width:35px;
height:15px;
background:#111;
border-radius:3px;
}

.center{
flex:1;
position:relative;
overflow:hidden;
}

.photo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.text{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
color:white;
z-index:3;
padding:0 15px;
box-sizing:border-box;
}

.text h1{
font-size:22px;
margin:0 0 10px;
}

.text p{
font-size:14px;
margin:0;
line-height:1.6;
}

/* confetti */
.confetti{
position:absolute;
width:8px;
height:8px;
background:red;
top:-10px;
animation:fall 3s linear infinite;
z-index:20;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<audio id="music" src="song.mp3" loop></audio>

<!-- الصفحة الأولى -->
<div id="page1">
<button onclick="start()">Open your surprise 🎬</button>
</div>

<!-- الصفحة الثانية -->
<div id="page2">

<!-- 🎬 الستارة -->
<div class="curtain leftCurtain"></div>
<div class="curtain rightCurtain"></div>

<div class="wrapper">

<div class="strip">
<div class="hole"></div><div class="hole"></div><div class="hole"></div>
<div class="hole"></div><div class="hole"></div><div class="hole"></div>
</div>

<div class="center">

<img class="photo" src="photo.jpg">

<div class="overlay"></div>

<div class="text">
<h1>🎉 Happy Birthday Mark 🎂</h1>
<p>
كل سنة وانت طيب يا مارك ❤️  
السنة دي كلها فرحة ونجاح وضحك  
وأتمنى دايمًا تفضل أقرب صاحب ليا 🎉
</p>
</div>

</div>

<div class="strip">
<div class="hole"></div><div class="hole"></div><div class="hole"></div>
<div class="hole"></div><div class="hole"></div><div class="hole"></div>
</div>

</div>

</div>

<script>
function start(){

document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";

/* فتح الستارة */
setTimeout(()=>{
document.querySelectorAll(".curtain").forEach(c=>{
c.style.transform = c.classList.contains("leftCurtain")
? "translateX(-100%)"
: "translateX(100%)";
});
},100);

/* تشغيل الموسيقى */
let music = document.getElementById("music");
music.volume = 0;
music.play().catch(()=>{});

let v = 0;
let fade = setInterval(()=>{
if(v < 1){
v += 0.05;
music.volume = v;
}else{
clearInterval(fade);
}
},100);

/* confetti */
for(let i=0;i<40;i++){
let c = document.createElement("div");
c.className = "confetti";
c.style.left = Math.random()*100 + "vw";
c.style.background = ["#ff0","#f0f","#0ff","#f00","#0f0"][Math.floor(Math.random()*5)];
c.style.animationDuration = (2 + Math.random()*3) + "s";
document.body.appendChild(c);
}

}
</script>

</body>
</html>
