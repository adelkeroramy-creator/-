<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Birthday</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

/* الصفحة الأولى */
#page1{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ffb3c1);
position:absolute;
width:100%;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
background:white;
color:#ff4d6d;
font-weight:bold;
cursor:pointer;
}

/* الصفحة الثانية */
#page2{
display:none;
height:100vh;
width:100%;
position:absolute;
}

/* container */
.wrapper{
display:flex;
height:100%;
width:100%;
justify-content:center;
align-items:stretch;
gap:10px;
}

/* شريط الفيلم */
.strip{
width:70px;
min-width:70px;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:space-around;
align-items:center;
padding:10px 0;
box-sizing:border-box;
}

.hole{
width:40px;
height:20px;
background:#111;
border-radius:4px;
}

/* المنتصف */
.center{
flex:1;
height:100%;
position:relative;
overflow:hidden;
}

/* الصورة */
.photo{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
top:0;
left:0;
}

/* طبقة غامقة */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

/* النص */
.text{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
color:white;
text-align:center;
z-index:2;
}

.text h1{
font-size:20px;
margin:0 0 10px;
}

.text p{
font-size:14px;
line-height:1.6;
margin:0;
}

/* 🔥 تظبيط الموبايل */
@media (max-width:768px){

.strip{
width:55px;
min-width:55px;
}

.hole{
width:30px;
height:15px;
}

.text h1{
font-size:18px;
}

.text p{
font-size:13px;
}
}
</style>
</head>

<body>

<audio id="music" src="song.mp3" loop></audio>

<!-- page 1 -->
<div id="page1">
<button onclick="start()">Open your surprise 🎬</button>
</div>

<!-- page 2 -->
<div id="page2">

<div class="wrapper">

<div class="strip">
<div class="hole"></div><div class="hole"></div><div class="hole"></div>
<div class="hole"></div><div class="hole"></div><div class="hole"></div>
</div>

<div class="center">

<img class="photo" src="photo.jpg" alt="photo">

<div class="overlay"></div>

<div class="text">
<h1>🎉 Happy Birthday Mark 🎂</h1>
<p>
كل سنة وانت طيب يا مارك ❤️  
السنة دي كلها فرحة ونجاح وضحك  
وأتمنى دايمًا تفضل أقرب صاحب ليا 🎉
</p>
</div>

</div>

<div class="strip">
<div class="hole"></div><div class="hole"></div><div class="hole"></div>
<div class="hole"></div><div class="hole"></div><div class="hole"></div>
</div>

</div>

</div>

<script>
function start(){

document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";

// music
let music = document.getElementById("music");
music.volume = 0;
music.play().catch(()=>{});

// fade sound
let v = 0;
let fade = setInterval(()=>{
if(v < 1){
v += 0.05;
music.volume = v;
}else{
clearInterval(fade);
}
},120);

}
</script>

</body>
</html>
